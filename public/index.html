<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>APA 7 for Google Docs</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>APA 7 for Google Docs</h1>
      <p>Select a source type, search, then generate the APA citation and a Google Docs ready APA citation.</p>

      <form id="search-form" class="panel">
        <label>Source Type</label>
        <div id="source-tabs" class="source-tabs">
          <button type="button" class="source-tab is-active" data-source="webpage">Website</button>
          <button type="button" class="source-tab" data-source="book">Book</button>
          <button type="button" class="source-tab" data-source="article_journal">Journal Article</button>
          <button type="button" class="source-tab" data-source="video">Video</button>
        </div>
        <label id="query-label" for="query-input">Webpage URL</label>
        <div class="row">
          <input
            id="query-input"
            name="query"
            type="text"
            placeholder="https://example.com/article"
            required
          />
          <button type="submit">Search</button>
        </div>
      </form>

      <section id="results-panel" class="panel">
        <h2>Search Results</h2>
        <div id="results" class="results empty">No results yet.</div>
      </section>

      <section id="output-panel" class="panel hidden">
        <button id="back-to-results" type="button" class="back-btn" aria-label="Back to results">&larr;</button>
        <h2>APA Output</h2>
        <div id="output" class="output empty"></div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
